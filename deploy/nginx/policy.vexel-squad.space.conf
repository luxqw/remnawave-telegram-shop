# Vexel VPN — policy.vexel-squad.space
# Static site: web/policy/{index.html,style.css,script.js}
#
# This project's nginx.conf (see /opt/remnawave/nginx.conf) is one flat file with a
# server{} block per subdomain, all reusing the same shared cert at
# /etc/nginx/ssl/vexel-squad.space/{fullchain,privkey}.pem — no sites-available/enabled,
# no certbot, no separate :80 blocks. This block follows the exact same pattern as the
# existing `redirect.vexel-squad.space` block.
#
# Deploy:
#   1. On the server: mkdir -p /var/www/policy.vexel-squad.space
#   2. From this repo: rsync -avz web/policy/ user@vexel-squad:/var/www/policy.vexel-squad.space/
#   3. Append the server{} block below to /opt/remnawave/nginx.conf
#   4. Reload nginx — if it runs as a container:
#        cd /opt/remnawave && docker compose exec nginx nginx -t && docker compose exec nginx nginx -s reload
#      if it's a host service:
#        nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name policy.vexel-squad.space;

    ssl_certificate "/etc/nginx/ssl/vexel-squad.space/fullchain.pem";
    ssl_certificate_key "/etc/nginx/ssl/vexel-squad.space/privkey.pem";
    ssl_trusted_certificate "/etc/nginx/ssl/vexel-squad.space/fullchain.pem";

    root /var/www/policy.vexel-squad.space;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

# Vexel VPN — policy.vexel-squad.space
# Static site: web/policy/{index.html,style.css,script.js}
#
# Deploy:
#   1. sudo mkdir -p /var/www/policy.vexel-squad.space
#   2. rsync -avz web/policy/ user@server:/var/www/policy.vexel-squad.space/
#   3. sudo cp deploy/nginx/policy.vexel-squad.space.conf /etc/nginx/sites-available/
#      sudo ln -s /etc/nginx/sites-available/policy.vexel-squad.space.conf /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d policy.vexel-squad.space
#      (certbot will rewrite the server blocks below to add ssl_certificate directives)

server {
    listen 80;
    listen [::]:80;
    server_name policy.vexel-squad.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name policy.vexel-squad.space;

    # ssl_certificate     /etc/letsencrypt/live/policy.vexel-squad.space/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/policy.vexel-squad.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/policy.vexel-squad.space;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
